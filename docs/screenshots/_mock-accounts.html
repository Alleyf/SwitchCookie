<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SwitchCookie · 账号列表</title>
  <link rel="stylesheet" href="../../popup/popup.css" />
  <style>
    html, body { background: #e5e7eb; }
    body { width: 340px; min-height: 420px; margin: 0 auto; background: var(--bg); box-shadow: 0 8px 30px rgba(0,0,0,.12); }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
        <defs>
          <linearGradient id="scBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6366F1"/><stop offset="1" stop-color="#EC4899"/>
          </linearGradient>
          <linearGradient id="scRing" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#38BDF8"/><stop offset="1" stop-color="#8B5CF6"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#scBg)"/>
        <g transform="translate(5 4)">
          <circle cx="8" cy="8" r="7" fill="#FDE68A"/>
          <circle cx="5.5" cy="6" r="0.9" fill="#7C2D12"/>
          <circle cx="10.5" cy="5.5" r="0.7" fill="#7C2D12"/>
          <circle cx="4.5" cy="10" r="0.75" fill="#7C2D12"/>
          <circle cx="10.5" cy="10.5" r="0.85" fill="#7C2D12"/>
        </g>
        <g transform="translate(15 15)">
          <circle cx="7" cy="7" r="6.2" fill="#FCA5A5"/>
          <circle cx="4.5" cy="5" r="0.7" fill="#7F1D1D"/>
          <circle cx="9" cy="4.5" r="0.6" fill="#7F1D1D"/>
          <circle cx="4" cy="9" r="0.65" fill="#7F1D1D"/>
          <circle cx="9.5" cy="9.5" r="0.8" fill="#7F1D1D"/>
        </g>
        <g transform="translate(16 16)">
          <circle r="4.2" fill="#ffffff"/>
          <circle r="4.2" fill="none" stroke="url(#scRing)" stroke-width="0.8"/>
          <g stroke="#4F46E5" stroke-width="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -2 -0.9 h 3.4 M 1.4 -0.9 l -0.9 -0.9 M 1.4 -0.9 l -0.9 0.9"/>
            <path d="M 2 0.9 h -3.4 M -1.4 0.9 l 0.9 -0.9 M -1.4 0.9 l 0.9 0.9"/>
          </g>
        </g>
      </svg>
      <div class="title">
        <div class="name">SwitchCookie</div>
        <div class="host">github.com · 组: github.com</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" title="设置">⚙</button>
      <button class="icon-btn danger-hover" title="清空">⎋</button>
    </div>
  </header>

  <div class="bind-bar">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
      <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
    </svg>
    <span class="bind-text">此标签已隔离绑定：工作号</span>
    <button class="link-btn">解除隔离</button>
  </div>

  <main>
    <section class="accounts">
      <div class="account active">
        <div class="avatar">工</div>
        <div class="account-body">
          <div class="account-name">工作号 <span class="tag">当前标签</span></div>
          <div class="account-meta">
            <span class="badge">🍪 12</span>
            <span class="badge">📦 8</span>
            <span class="badge">刚刚</span>
          </div>
        </div>
        <div class="actions" style="opacity:1">
          <button class="action-btn" title="新标签打开">↗</button>
          <button class="action-btn" title="编辑">✎</button>
        </div>
      </div>
      <div class="account">
        <div class="avatar">私</div>
        <div class="account-body">
          <div class="account-name">私人号</div>
          <div class="account-meta">
            <span class="badge">🍪 9</span>
            <span class="badge warn">⚠ 1 过期</span>
            <span class="badge">2 小时前</span>
          </div>
        </div>
      </div>
      <div class="account">
        <div class="avatar">测</div>
        <div class="account-body">
          <div class="account-name">测试账号</div>
          <div class="account-meta">
            <span class="badge">🍪 5</span>
            <span class="badge">📦 3</span>
            <span class="badge">3 天前</span>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <button class="btn primary">+ 保存当前身份为新账号</button>
  </footer>
</body>
</html>
