<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="SwitchCookie logo">
  <defs>
    <linearGradient id="g-front" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="g-back" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C4B5FD"/>
      <stop offset="1" stop-color="#A5B4FC"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- 背后一枚（错位 → 表达"切换 / 多账号"） -->
  <g transform="translate(20 30) rotate(-8 40 40)">
    <circle cx="40" cy="40" r="36" fill="url(#g-back)" opacity="0.55"/>
    <circle cx="30" cy="30" r="3.2" fill="#4F3AB4" opacity="0.55"/>
    <circle cx="52" cy="26" r="2.4" fill="#4F3AB4" opacity="0.55"/>
    <circle cx="24" cy="50" r="2.8" fill="#4F3AB4" opacity="0.55"/>
    <circle cx="50" cy="54" r="2.2" fill="#4F3AB4" opacity="0.55"/>
  </g>

  <!-- 前面主 Cookie -->
  <g transform="translate(30 22) rotate(6 40 40)">
    <circle cx="40" cy="40" r="38" fill="url(#g-front)"/>
    <circle cx="40" cy="40" r="38" fill="none" stroke="#4C1D95" stroke-opacity="0.15" stroke-width="1"/>
    <!-- 咬一口的缺口 -->
    <path d="M 76 26
             a 10 10 0 0 1 -12 12
             a 8 8 0 0 0 -10 10
             a 9 9 0 0 1 -12 -12
             Z"
          fill="#0F1224" opacity="0.0"/>
    <path d="M 40 2
             a 38 38 0 1 1 -38 38
             a 12 11 0 0 0 14 -6
             a 9 9 0 0 1 12 -8
             a 10 10 0 0 0 10 -12
             a 11 10 0 0 1 12 -12"
          fill="url(#g-front)"/>
    <!-- Chocolate chips -->
    <circle cx="30" cy="34" r="3.6" fill="#1E1B4B"/>
    <circle cx="48" cy="30" r="2.6" fill="#1E1B4B"/>
    <circle cx="26" cy="52" r="3.0" fill="#1E1B4B"/>
    <circle cx="46" cy="52" r="2.2" fill="#1E1B4B"/>
    <circle cx="38" cy="44" r="2.0" fill="#1E1B4B"/>
    <!-- 内部切换箭头 -->
    <g stroke="#FFFFFF" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(40 40)">
      <path d="M -10 -3 h 20 l -4 -4 M 10 3 h -20 l 4 4"/>
    </g>
  </g>
</svg>
