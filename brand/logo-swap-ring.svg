<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="SwitchCookie logo C">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="g3-highlight" cx="0.3" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 单枚 Cookie 主体 -->
  <circle cx="64" cy="64" r="52" fill="url(#g3)"/>
  <circle cx="64" cy="64" r="52" fill="url(#g3-highlight)"/>
  <circle cx="64" cy="64" r="52" fill="none" stroke="#312E81" stroke-opacity="0.25" stroke-width="1.2"/>

  <!-- 芯片 = 小圆点 -->
  <circle cx="42" cy="46" r="5" fill="#0F172A"/>
  <circle cx="80" cy="42" r="3.6" fill="#0F172A"/>
  <circle cx="86" cy="72" r="4.4" fill="#0F172A"/>
  <circle cx="46" cy="82" r="3.2" fill="#0F172A"/>

  <!-- 中央双向"切换"环 -->
  <g transform="translate(64 64)" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round">
    <!-- 上半圆箭头 -->
    <path d="M -18 -4 A 18 18 0 0 1 18 -4"/>
    <path d="M 18 -4 l -5 -5 M 18 -4 l -5 5"/>
    <!-- 下半圆箭头 -->
    <path d="M 18 4 A 18 18 0 0 1 -18 4"/>
    <path d="M -18 4 l 5 -5 M -18 4 l 5 5"/>
  </g>
</svg>
