  </defs>

  <!-- squircle 背板 -->
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#g2)"/>
  <rect x="10" y="10" width="108" height="108" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="1.2"/>

  <!-- 上层 Cookie -->
  <g transform="translate(24 22)">
    <circle cx="30" cy="30" r="26" fill="#FDE68A"/>
    <circle cx="30" cy="30" r="26" fill="none" stroke="#B45309" stroke-opacity="0.35" stroke-width="1.2"/>
    <circle cx="22" cy="24" r="3.2" fill="#7C2D12"/>
    <circle cx="38" cy="20" r="2.4" fill="#7C2D12"/>
    <circle cx="18" cy="38" r="2.6" fill="#7C2D12"/>
    <circle cx="38" cy="40" r="3.0" fill="#7C2D12"/>
    <circle cx="30" cy="30" r="1.8" fill="#7C2D12"/>
  </g>

  <!-- 下层 Cookie -->
  <g transform="translate(60 60)">
    <circle cx="24" cy="24" r="22" fill="#FCA5A5"/>
    <circle cx="24" cy="24" r="22" fill="none" stroke="#7F1D1D" stroke-opacity="0.35" stroke-width="1.1"/>
    <circle cx="16" cy="18" r="2.4" fill="#7F1D1D"/>
    <circle cx="30" cy="16" r="2.0" fill="#7F1D1D"/>
    <circle cx="14" cy="30" r="2.2" fill="#7F1D1D"/>
