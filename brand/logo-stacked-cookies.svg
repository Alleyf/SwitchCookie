    <g stroke="#4F46E5" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -7 -3 h 12 M 5 -3 l -3 -3 M 5 -3 l -3 3"/>
      <path d="M 7 3 h -12 M -5 3 l 3 -3 M -5 3 l 3 3"/>
