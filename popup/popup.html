<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SwitchCookie</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <svg class="logo" viewBox="0 0 32 32" aria-hidden="true">
        <defs>
          <linearGradient id="scBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#6366F1"/>
            <stop offset="1" stop-color="#EC4899"/>
          </linearGradient>
          <linearGradient id="scRing" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#38BDF8"/>
            <stop offset="1" stop-color="#8B5CF6"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="28" height="28" rx="8" fill="url(#scBg)"/>
        <g transform="translate(5 4)">
          <circle cx="8" cy="8" r="7" fill="#FDE68A"/>
          <circle cx="5.5" cy="6" r="0.9" fill="#7C2D12"/>
          <circle cx="10.5" cy="5.5" r="0.7" fill="#7C2D12"/>
          <circle cx="4.5" cy="10" r="0.75" fill="#7C2D12"/>
          <circle cx="10.5" cy="10.5" r="0.85" fill="#7C2D12"/>
        </g>
        <g transform="translate(15 15)">
          <circle cx="7" cy="7" r="6.2" fill="#FCA5A5"/>
          <circle cx="4.5" cy="5" r="0.7" fill="#7F1D1D"/>
          <circle cx="9" cy="4.5" r="0.6" fill="#7F1D1D"/>
          <circle cx="4" cy="9" r="0.65" fill="#7F1D1D"/>
          <circle cx="9.5" cy="9.5" r="0.8" fill="#7F1D1D"/>
        </g>
        <g transform="translate(16 16)">
          <circle r="4.2" fill="#ffffff"/>
          <circle r="4.2" fill="none" stroke="url(#scRing)" stroke-width="0.8"/>
          <g stroke="#4F46E5" stroke-width="0.9" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M -2 -0.9 h 3.4 M 1.4 -0.9 l -0.9 -0.9 M 1.4 -0.9 l -0.9 0.9"/>
            <path d="M 2 0.9 h -3.4 M -1.4 0.9 l 0.9 -0.9 M -1.4 0.9 l 0.9 0.9"/>
          </g>
        </g>
      </svg>
      <div class="title">
        <div class="name">SwitchCookie</div>
        <div class="host" id="hostLabel">—</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="settingsBtn" title="设置">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.36.15.68.4 1 .73.32.32.5.7.51 1.09"/>
        </svg>
      </button>
      <button class="icon-btn" id="backBtn" title="返回" hidden>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </button>
      <button class="icon-btn danger-hover" id="logoutBtn" title="清空当前站点登录信息">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <!-- 当前标签绑定状态条 -->
    <div class="bind-bar" id="bindBar" hidden>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
      <span class="bind-text">此标签已隔离绑定</span>
      <button class="link-btn" id="unbindBtn">解除隔离</button>
    </div>
    <!-- 解锁面板 -->
    <section class="lock-panel" id="lockPanel" hidden>
      <div class="lock-illus">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div class="lock-title">已启用主密码保护</div>
      <div class="lock-desc">请输入主密码以访问已保存的账号快照。</div>
      <input type="password" id="unlockInput" placeholder="主密码" />
      <button class="btn primary" id="unlockBtn">解锁</button>
    </section>

    <!-- 账号列表 -->
    <section class="accounts" id="accountList"></section>

    <!-- 账号编辑器 -->
    <section class="editor" id="editorView" hidden>
      <div class="editor-head">
        <input type="text" id="editorName" placeholder="账号名称" maxlength="30" />
      </div>
      <div class="tabs" id="editorTabs">
        <button class="tab active" data-tab="cookies">🍪 Cookie <span class="count" id="cntCookies">0</span></button>
        <button class="tab" data-tab="local">📦 Local <span class="count" id="cntLocal">0</span></button>
        <button class="tab" data-tab="session">⚡ Session <span class="count" id="cntSession">0</span></button>
      </div>
      <div class="editor-toolbar">
        <input type="search" id="editorSearch" placeholder="搜索名称 / 键..." />
        <button class="btn small primary" id="editorAddBtn" title="新增">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span id="editorAddLabel">新增</span>
        </button>
      </div>
      <div class="editor-list" id="editorList"></div>
      <div class="editor-empty" id="editorEmpty" hidden>暂无条目</div>
    </section>

    <div class="empty" id="emptyState" hidden>
      <div class="empty-illus">
        <svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="24" cy="18" r="7"/>
          <path d="M9 39c2-7 8-11 15-11s13 4 15 11"/>
        </svg>
      </div>
      <div class="empty-title">还没有保存的账号</div>
      <div class="empty-desc">先在网页里正常登录，然后点击下方按钮把当前身份保存起来。</div>
    </div>
  </main>

  <footer class="app-footer" id="mainFooter">
    <button class="btn primary" id="addBtn">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span>保存当前身份为新账号</span>
    </button>
  </footer>

  <footer class="app-footer" id="editorFooter" hidden>
    <button class="btn ghost" id="editorCancelBtn">取消</button>
    <button class="btn primary" id="editorSaveBtn">保存修改</button>
  </footer>

  <div class="toast" id="toast" hidden></div>

  <!-- 命名 / 重命名 输入弹层 -->
  <div class="dialog" id="dialog" hidden>
    <div class="dialog-mask" data-close></div>
    <div class="dialog-panel">
      <div class="dialog-title" id="dialogTitle">命名账号</div>
      <input type="text" id="dialogInput" placeholder="例如：工作号 / 主账号" maxlength="30" />
      <div class="dialog-actions">
        <button class="btn ghost" id="dialogCancel">取消</button>
        <button class="btn primary" id="dialogOk">确定</button>
      </div>
    </div>
  </div>

  <!-- 确认弹层 -->
  <div class="dialog" id="confirmDialog" hidden>
    <div class="dialog-mask" data-close></div>
    <div class="dialog-panel">
      <div class="dialog-title" id="confirmTitle">确认</div>
      <div class="dialog-body" id="confirmBody">确定要执行此操作吗？</div>
      <div class="dialog-actions">
        <button class="btn ghost" id="confirmCancel">取消</button>
        <button class="btn primary" id="confirmOk">确定</button>
      </div>
    </div>
  </div>

  <!-- Cookie 详情编辑 -->
  <div class="dialog" id="cookieDialog" hidden>
    <div class="dialog-mask" data-close></div>
    <div class="dialog-panel wide">
      <div class="dialog-title" id="cookieDlgTitle">编辑 Cookie</div>
      <div class="form">
        <label class="form-row">
          <span class="form-label">名称</span>
          <input type="text" id="ckName" placeholder="cookie 名" />
        </label>
        <label class="form-row">
          <span class="form-label">值</span>
          <textarea id="ckValue" rows="3" placeholder="cookie 值"></textarea>
        </label>
        <div class="form-grid">
          <label class="form-row">
            <span class="form-label">Domain</span>
            <input type="text" id="ckDomain" placeholder=".example.com" />
          </label>
          <label class="form-row">
            <span class="form-label">Path</span>
            <input type="text" id="ckPath" placeholder="/" />
          </label>
        </div>
        <div class="form-grid">
          <label class="form-row">
            <span class="form-label">过期时间</span>
            <input type="datetime-local" id="ckExpires" step="1" />
          </label>
          <label class="form-row">
            <span class="form-label">SameSite</span>
            <select id="ckSameSite">
              <option value="unspecified">unspecified</option>
              <option value="no_restriction">no_restriction</option>
              <option value="lax">lax</option>
              <option value="strict">strict</option>
            </select>
          </label>
        </div>
        <div class="form-flags">
          <label><input type="checkbox" id="ckSession" /> Session（关闭浏览器失效）</label>
          <label><input type="checkbox" id="ckSecure" /> Secure</label>
          <label><input type="checkbox" id="ckHttpOnly" /> HttpOnly</label>
          <label><input type="checkbox" id="ckHostOnly" /> HostOnly</label>
        </div>
      </div>
      <div class="dialog-actions between">
        <button class="btn ghost danger" id="cookieDeleteBtn">删除</button>
        <div>
          <button class="btn ghost" id="cookieCancelBtn">取消</button>
          <button class="btn primary" id="cookieOkBtn">确定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- KV 键值编辑 -->
  <div class="dialog" id="kvDialog" hidden>
    <div class="dialog-mask" data-close></div>
    <div class="dialog-panel wide">
      <div class="dialog-title" id="kvDlgTitle">编辑存储项</div>
      <div class="form">
        <label class="form-row">
          <span class="form-label">键</span>
          <input type="text" id="kvKey" placeholder="key" />
        </label>
        <label class="form-row">
          <span class="form-label">值</span>
          <textarea id="kvValue" rows="6" placeholder="value"></textarea>
        </label>
      </div>
      <div class="dialog-actions between">
        <button class="btn ghost danger" id="kvDeleteBtn">删除</button>
        <div>
          <button class="btn ghost" id="kvCancelBtn">取消</button>
          <button class="btn primary" id="kvOkBtn">确定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 设置面板 -->
  <div class="dialog" id="settingsDialog" hidden>
    <div class="dialog-mask" data-close></div>
    <div class="dialog-panel wide">
      <div class="dialog-title">设置</div>
      <div class="settings-section">
        <div class="settings-row">
          <div>
            <div class="settings-label">主密码保护</div>
            <div class="settings-hint" id="encStatus">未启用</div>
          </div>
          <button class="btn" id="toggleEncBtn">启用</button>
        </div>
        <div class="settings-row" id="changePwRow" hidden>
          <div>
            <div class="settings-label">修改主密码</div>
            <div class="settings-hint">建议定期更换</div>
          </div>
          <button class="btn" id="changePwBtn">修改</button>
        </div>
        <div class="settings-row" id="lockRow" hidden>
          <div>
            <div class="settings-label">立即锁定</div>
            <div class="settings-hint">清除内存中的解锁状态</div>
          </div>
          <button class="btn" id="lockNowBtn">锁定</button>
        </div>
      </div>
      <div class="dialog-actions">
        <button class="btn primary" id="settingsClose">关闭</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
